name: Deploy to GitHub Pages

# Build the Vite output and publish dist/ as the Pages artifact.
# CNAME + .nojekyll ride along from public/.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write # publish to Pages
  id-token: write # OIDC auth for actions/deploy-pages

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck # fail the deploy on a type regression
      - run: npm test # gate on the core + shell tests
      - run: npm run build
      # include-hidden-files: dist/ carries .nojekyll, which the action drops by default
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
