<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1113">
  <title>rack.bar — load the bar</title>
  <meta name="description" content="Load a barbell to a target weight. Tells you exactly which plates to put on each side.">
  <link rel="stylesheet" href="tokens.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--rack-bg);
      color: var(--rack-fg);
      font-family: var(--rack-font);
      min-height: 100svh;
      display: flex; flex-direction: column;
      /* respect notches/home indicators on phones */
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    /* No horizontal scroll at a phone width: the app is a single column. */
    body { overflow-x: hidden; }
  </style>
</head>
<body>
  <!-- The app shell (RBAR-15, ADR-0007): the header (wordmark + Setup pill), the
       calculator console, and the Setup sheet that hosts rig configuration. The shell
       owns the chosen Bar and threads it into the parameterized core (ADR-0002). -->
  <rack-app></rack-app>

  <script type="module" src="./elements/app.ts"></script>
</body>
</html>
